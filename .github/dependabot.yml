version: 2
updates:
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    groups:
      microsoft-extensions:
        patterns: ["Microsoft.Extensions.*", "System.Text.Json"]
      test-dependencies:
        patterns: ["xunit*", "Microsoft.NET.Test.Sdk", "coverlet*", "NetArchTest*"]
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
