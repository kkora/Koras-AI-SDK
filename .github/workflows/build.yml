name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CI: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # deterministic builds / SourceLink

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore

      - name: Verify formatting
        run: dotnet format --verify-no-changes --no-restore

      - name: Build (Release, warnings as errors)
        run: dotnet build --configuration Release --no-restore

      - name: Vulnerability audit
        run: |
          dotnet list package --vulnerable --include-transitive | tee vulnerable.txt
          if grep -q "has the following vulnerable packages" vulnerable.txt; then
            echo "::error::Vulnerable packages detected"; exit 1
          fi

      - name: Upload build artifacts for test job
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: |
            **/bin/Release/**
          retention-days: 1
