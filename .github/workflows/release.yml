name: release

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write
  id-token: write # GitHub OIDC token for NuGet Trusted Publishing

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CI: true

jobs:
  release:
    runs-on: ubuntu-latest
    # Protected environment: configure required reviewers in repository settings.
    # Publishing uses NuGet Trusted Publishing (OIDC) — no stored API key; the
    # trusted publishing policy on nuget.org pins this repo, workflow, and environment.
    # See docs/release/nuget-publishing.md.
    environment: nuget-release
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          global-json-file: global.json
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Derive version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Pack
        run: >
          dotnet pack --configuration Release --no-build
          --output artifacts/packages
          -p:Version=${{ steps.version.outputs.version }}

      # Exchanges the job's OIDC token for a 1-hour nuget.org API key, so it must
      # run right before the push. `user` is the nuget.org profile that owns the
      # trusted publishing policy.
      - name: NuGet login (OIDC)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: kora.kanchan

      - name: Publish to NuGet.org
        run: >
          dotnet nuget push "artifacts/packages/*.nupkg"
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
