name: package

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CI: true

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack (includes package validation)
        run: >
          dotnet pack --configuration Release --no-build
          --output artifacts/packages
          -p:VersionSuffix=preview.${{ github.run_number }}

      - name: Validate package contents
        run: |
          set -e
          for pkg in artifacts/packages/*.nupkg; do
            echo "== $pkg"
            unzip -l "$pkg" | grep -E "icon.png|README.md|LICENSE|\.xml" || { echo "::error::$pkg missing required assets"; exit 1; }
          done

      - name: Upload prerelease packages (main only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: nuget-prerelease
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
